<div
  class="p-8 h-screen flex flex-col md:flex-row justify-center space-y-10 md:space-y-0 md:space-x-16 items-center my-2 mx-5 md:mx-0 md:my-0"
>
  <div class="md:w-1/3 max-w-sm">
    <span class="text-9xl text-orange-500">Playlist</span>
  </div>
  <form (submit)="sendData()" class="md:w-1/3 max-w-sm">
    <input
      class="w-full rounded border-2 text-white border-white-200 bg-transparent p-2 mb-4"
      name="email"
      placeholder="Email"
      type="email"
      [(ngModel)]="email"
    />
    <input
      class="w-full rounded border-2 text-white border-white-200 bg-transparent p-2"
      name="password"
      placeholder="Password"
      type="password"
      [(ngModel)]="password"
    />
    @if (errorMessage()) {
      <p class="text-red-500 text-sm mt-2">{{ errorMessage() }}</p>
    }
    <div class="text-center md:text-left">
      <button
        type="submit"
        [disabled]="!isFormValid()"
        class="font-bold text-white bg-orange-500 rounded py-2 px-3 mt-6 disabled:opacity-50 disabled:cursor-not-allowed hover:cursor-pointer"
      >
        Login
      </button>
    </div>
  </form>
</div>
