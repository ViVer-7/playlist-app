<div
  class="p-8 h-screen flex flex-col md:flex-row justify-center space-y-10 md:space-y-0 md:space-x-16 items-center my-2 mx-5 md:mx-0 md:my-0"
>
  <div class="md:w-1/3 max-w-sm">
    <span class="text-9xl text-orange-500">Axxes</span>
  </div>
  <form (submit)="sendData()" class="md:w-1/3 max-w-sm">
    <input
      class="w-full rounded border-2 text-white border-white-200 bg-transparent p-2 mb-4"
      type="text"
      [ngModel]="email"
      name="email"
      placeholder="Email"
    />
    <input
      class="w-full rounded border-2 text-white border-white-200 bg-transparent p-2"
      type="text"
      [ngModel]="password"
      name="password"
      placeholder="Password"
    />
    <div class="text-center md:text-left">
      <button
        type="submit"
        class="hover:cursor-pointer font-bold text-white bg-orange-500 rounded py-2 px-3 mt-6"
      >
        Login
      </button>
    </div>
  </form>
</div>
