<div class="flex items-center space-x-4 p-2">
    <div class="flex-shrink-0">
        <img class="w-12 h-12 rounded-md object-cover" [src]="song().albumImage" alt="{{ song().name }}" />
    </div>
    <div class="flex-1 min-w-0">
        <div class="text-sm font-medium text-gray-300 truncate">{{ song().name }}</div>
        <div class="text-sm text-gray-500 truncate">{{ song().artist }}</div>
    </div>
    <ng-content />
</div>
