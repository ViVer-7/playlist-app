<div
  class="fixed inset-0 bg-black/70 flex items-center justify-center z-50"
  (click)="onOverlayClick($event)"
>
  <div class="bg-stone-800 rounded-xl p-6 max-w-md w-full mx-4 relative">
    <button
      class="absolute top-4 right-4 text-gray-400 hover:text-white text-2xl leading-none hover:cursor-pointer"
      (click)="close.emit()"
    >
      &times;
    </button>

    <div class="flex flex-col items-center gap-4">
      <img
        alt="{{ song().name }}"
        class="w-48 h-48 rounded-lg shadow-lg object-cover"
        [src]="song().albumImage"
      />
      <div class="text-center">
        <h2 class="text-2xl font-bold text-white">{{ song().name }}</h2>
        <p class="text-gray-400 text-lg">{{ song().artist }}</p>
      </div>

      <div class="grid grid-cols-2 gap-x-8 gap-y-3 w-full text-sm mt-2">
        <div>
          <span class="text-gray-500">Album</span>
          <p class="text-white">{{ song().album }}</p>
        </div>
        <div>
          <span class="text-gray-500">Year</span>
          <p class="text-white">{{ song().year }}</p>
        </div>
        <div>
          <span class="text-gray-500">Genre</span>
          <p class="text-white">{{ song().genre }}</p>
        </div>
        <div>
          <span class="text-gray-500">BPM</span>
          <p class="text-white">{{ song().bpm }}</p>
        </div>
        <div class="col-span-2">
          <span class="text-gray-500">Duration</span>
          <p class="text-white">{{ formatDuration(song().duration) }}</p>
        </div>
      </div>

      @if (song().spotifyId) {
        <a
          class="mt-2 inline-block bg-green-600 hover:bg-green-500 text-white font-bold py-2 px-6 rounded-full transition-colors"
          rel="noopener"
          target="_blank"
          [href]="getSpotifyUrl(song().spotifyId)"
        >
          Open in Spotify
        </a>
      }
    </div>
  </div>
</div>
